<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nova tarefa</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">

        <div class="topbar">

            <h1>Nova tarefa</h1>

            <a href="index.html" class="btn-nova">
                Voltar
            </a>

        </div>

        <form id="formTarefa">

            <input
                type="text"
                id="titulo"
                placeholder="Título"
                required
            >

            <textarea
                id="descricao"
                placeholder="Descrição"
            ></textarea>

            <select id="prioridade">

                <option value="Baixa">
                    Baixa
                </option>

                <option value="Média">
                    Média
                </option>

                <option value="Alta">
                    Alta
                </option>

            </select>

            <input
                type="date"
                id="prazo"
            >

            <button type="submit">
                Criar tarefa
            </button>

        </form>

    </main>

    <script src="nova.js"></script>

</body>
</html>
